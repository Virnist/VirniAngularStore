<div class="container">
  <header>
    <h1>Virni Fashion</h1>
    
    <div class="header-controls">
      <button class="theme-toggle" (click)="toggleTheme()">
        {{ isDarkMode ? '☀️' : '🌙' }}
      </button>

      <div class="lang-switcher">
        <button [class.active]="currentLang === 'uk'" (click)="changeLang('uk')">UA</button>
        <button [class.active]="currentLang === 'en'" (click)="changeLang('en')">EN</button>
      </div>
    </div>
  </header>

  <nav class="main-nav">
    <a routerLink="/news" routerLinkActive="active-link">{{ 'MENU.NEWS' | translate }}</a>
    <a routerLink="/shop" routerLinkActive="active-link">{{ 'MENU.SHOP' | translate }}</a>
    <a routerLink="/videos" routerLinkActive="active-link">{{ 'MENU.VIDEOS' | translate }}</a>
  </nav>

  <main>
    <router-outlet></router-outlet>
  </main>
</div>
