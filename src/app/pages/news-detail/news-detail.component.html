@if (article) {
  <div class="article-wrapper">
    <div class="container">
      <header class="article-header">
        <div class="image-hero" [style.backgroundImage]="'url(' + article.image + ')'"></div>
        <div class="header-content">
          <span class="date">{{ article.date | date:'longDate' }}</span>
          <h1>{{ getContent('title') }}</h1>
        </div>
      </header>

      <section class="article-body">
        <p class="lead-text">{{ getContent('text') }}</p>
        </section>

      <div class="actions-footer">
        <button routerLink="/news" class="btn-back">
          <span class="icon">←</span>
          <span class="text">{{ 'NEWS.BACK' | translate }}</span>
        </button>
      </div>
    </div>
  </div>
}
